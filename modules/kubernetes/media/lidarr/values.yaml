# Lidarr - music management (arr-stack)
# LinuxServer.io image with init container for stable API key.
# Config PVC + shared-data via existingClaim.
defaultPodOptions:
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0
    fsGroup: __PGID__
    fsGroupChangePolicy: OnRootMismatch
controllers:
  lidarr:
    strategy: Recreate
    initContainers:
      init-api-key:
        image:
          repository: busybox
          tag: "1.37.0"
        command: ["sh", "-c"]
        args:
          - |
            API_KEY=$(cat /secrets/api-key)
            if [ ! -f /config/config.xml ]; then
              echo "Pre-seeding config.xml with stable API key..."
              cat > /config/config.xml <<XMLEOF
            <Config>
              <ApiKey>${API_KEY}</ApiKey>
              <AnalyticsEnabled>False</AnalyticsEnabled>
            </Config>
            XMLEOF
              chown __PUID__:__PGID__ /config/config.xml
              echo "config.xml created with stable API key"
            else
              CURRENT_KEY=$(sed -n 's/.*<ApiKey>\(.*\)<\/ApiKey>.*/\1/p' /config/config.xml)
              if [ "$CURRENT_KEY" != "$API_KEY" ]; then
                echo "Updating API key in existing config.xml..."
                sed -i "s|<ApiKey>.*</ApiKey>|<ApiKey>${API_KEY}</ApiKey>|" /config/config.xml
                echo "API key updated"
              else
                echo "config.xml API key matches secret, no change needed"
              fi
            fi
    containers:
      main:
        image:
          repository: lscr.io/linuxserver/lidarr
          tag: "3.1.0"
        env:
          PUID: "__PUID__"
          PGID: "__PGID__"
          TZ: __TIMEZONE__
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 512Mi
service:
  lidarr:
    controller: lidarr
    ports:
      http:
        port: 8686
        targetPort: 8686
persistence:
  config:
    type: persistentVolumeClaim
    existingClaim: lidarr-config
    globalMounts:
      - path: /config
  data:
    type: persistentVolumeClaim
    existingClaim: shared-data
    advancedMounts:
      lidarr:
        main:
          - path: /data
  api-key-secret:
    type: secret
    name: lidarr-api-key
    advancedMounts:
      lidarr:
        init-api-key:
          - path: /secrets
            readOnly: true
