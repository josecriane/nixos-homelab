# arr-instance template - prowlarr/sonarr/radarr with stable API key
# Used for prowlarr, sonarr, sonarr-es, radarr, radarr-es.
# Tokens __NAME__/__IMAGE_REPO__/__IMAGE_TAG__/__PORT__/__CONFIG_PVC__/
# __SECRET__/__EXTRA_MOUNT__/__EXTRA_VOLUME__/__CPU_REQ__/__MEM_REQ__/__MEM_LIM__/
# __TIMEZONE__/__PUID__/__PGID__ are substituted at build time.
defaultPodOptions:
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0
    fsGroup: __PGID__
    fsGroupChangePolicy: OnRootMismatch
controllers:
  __NAME__:
    strategy: Recreate
    initContainers:
      init-api-key:
        image:
          repository: busybox
          tag: "1.37.0"
        command: ["sh", "-c"]
        args:
          - |
            API_KEY=$(cat /secrets/api-key)
            if [ ! -f /config/config.xml ]; then
              echo "Pre-seeding config.xml with stable API key..."
              cat > /config/config.xml <<XMLEOF
            <Config>
              <ApiKey>${API_KEY}</ApiKey>
              <AnalyticsEnabled>False</AnalyticsEnabled>
            </Config>
            XMLEOF
              chown __PUID__:__PGID__ /config/config.xml
              echo "config.xml created with stable API key"
            else
              CURRENT_KEY=$(sed -n 's/.*<ApiKey>\(.*\)<\/ApiKey>.*/\1/p' /config/config.xml)
              if [ "$CURRENT_KEY" != "$API_KEY" ]; then
                echo "Updating API key in existing config.xml..."
                sed -i "s|<ApiKey>.*</ApiKey>|<ApiKey>${API_KEY}</ApiKey>|" /config/config.xml
                echo "API key updated"
              else
                echo "config.xml API key matches secret, no change needed"
              fi
            fi
    containers:
      main:
        image:
          repository: __IMAGE_REPO__
          tag: "__IMAGE_TAG__"
        env:
          PUID: "__PUID__"
          PGID: "__PGID__"
          TZ: __TIMEZONE__
        resources:
          requests:
            cpu: __CPU_REQ__
            memory: __MEM_REQ__
          limits:
            memory: __MEM_LIM__
service:
  __NAME__:
    controller: __NAME__
    ports:
      http:
        port: __PORT__
        targetPort: __PORT__
persistence:
  config:
    type: persistentVolumeClaim
    existingClaim: __CONFIG_PVC__
    globalMounts:
      - path: /config
__EXTRA_PERSISTENCE__
  api-key-secret:
    type: secret
    name: __SECRET__
    advancedMounts:
      __NAME__:
        init-api-key:
          - path: /secrets
            readOnly: true
