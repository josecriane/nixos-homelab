# qBittorrent - BitTorrent client
# Two services: ClusterIP (WebUI) + LoadBalancer (BitTorrent peer traffic).
# BT LoadBalancer gets its own IP from MetalLB for peer discoverability.
defaultPodOptions:
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0
    fsGroup: __PGID__
    fsGroupChangePolicy: OnRootMismatch
controllers:
  qbittorrent:
    strategy: Recreate
    containers:
      main:
        image:
          repository: lscr.io/linuxserver/qbittorrent
          tag: "4.6.7"
        env:
          PUID: "__PUID__"
          PGID: "__PGID__"
          TZ: __TIMEZONE__
          WEBUI_PORT: "8080"
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 2Gi
service:
  qbittorrent:
    controller: qbittorrent
    ports:
      http:
        port: 8080
        targetPort: 8080
  qbittorrent-bt:
    controller: qbittorrent
    type: LoadBalancer
    ports:
      bittorrent-tcp:
        enabled: true
        port: 6881
        targetPort: 6881
        protocol: TCP
      bittorrent-udp:
        enabled: true
        port: 6881
        targetPort: 6881
        protocol: UDP
persistence:
  config:
    type: persistentVolumeClaim
    existingClaim: qbittorrent-config
    globalMounts:
      - path: /config
  data:
    type: persistentVolumeClaim
    existingClaim: shared-data
    advancedMounts:
      qbittorrent:
        main:
          - path: /data
