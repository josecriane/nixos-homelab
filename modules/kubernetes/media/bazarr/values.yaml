# Bazarr - subtitle management (arr-stack)
# LinuxServer.io image. Config PVC + shared-data via existingClaim.
defaultPodOptions:
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0
    fsGroup: __PGID__
    fsGroupChangePolicy: OnRootMismatch
controllers:
  bazarr:
    strategy: Recreate
    containers:
      main:
        image:
          repository: lscr.io/linuxserver/bazarr
          tag: "1.5.5"
        env:
          PUID: "__PUID__"
          PGID: "__PGID__"
          TZ: __TIMEZONE__
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 512Mi
service:
  bazarr:
    controller: bazarr
    ports:
      http:
        port: 6767
        targetPort: 6767
persistence:
  config:
    type: persistentVolumeClaim
    existingClaim: bazarr-config
    globalMounts:
      - path: /config
  data:
    type: persistentVolumeClaim
    existingClaim: shared-data
    advancedMounts:
      bazarr:
        main:
          - path: /data
