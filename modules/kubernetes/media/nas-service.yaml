apiVersion: v1
kind: Endpoints
metadata:
  name: __NAS_NAME__-__SERVICE_NAME__
  namespace: __NAMESPACE__
subsets:
  - addresses:
      - ip: __NAS_IP__
    ports:
      - port: __SERVICE_PORT__
        name: http
---
apiVersion: v1
kind: Service
metadata:
  name: __NAS_NAME__-__SERVICE_NAME__
  namespace: __NAMESPACE__
spec:
  ports:
    - port: __SERVICE_PORT__
      targetPort: __SERVICE_PORT__
      name: http
