# OpenStreetMap - offline world maps server
# nginx:alpine serving PMTiles + MapLibre GL JS frontend. Viewer HTML/nginx
# config come from the maplibre-viewer ConfigMap built in the setup script.
defaultPodOptions:
  automountServiceAccountToken: false
controllers:
  openstreetmap:
    strategy: Recreate
    containers:
      main:
        image:
          repository: nginx
          tag: alpine
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi
service:
  openstreetmap:
    controller: openstreetmap
    ports:
      http:
        port: 8080
        targetPort: 8080
persistence:
  data:
    type: persistentVolumeClaim
    existingClaim: openstreetmap-data
    globalMounts:
      - path: /data
        readOnly: true
  viewer-html:
    type: configMap
    name: maplibre-viewer
    advancedMounts:
      openstreetmap:
        main:
          - path: /usr/share/nginx/html/index.html
            subPath: index.html
  viewer-config:
    type: configMap
    name: maplibre-viewer
    advancedMounts:
      openstreetmap:
        main:
          - path: /etc/nginx/conf.d/default.conf
            subPath: nginx.conf
