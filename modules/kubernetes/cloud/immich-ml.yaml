apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich-ml
  namespace: __NAMESPACE__
spec:
  replicas: 1
  selector:
    matchLabels:
      app: immich-ml
  template:
    metadata:
      labels:
        app: immich-ml
    spec:
      containers:
      - name: immich-ml
        image: ghcr.io/immich-app/immich-machine-learning:v2.5.6
        env:
        - name: TZ
          value: "__TIMEZONE__"
        ports:
        - containerPort: 3003
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            memory: 1536Mi
        volumeMounts:
        - name: cache
          mountPath: /cache
      volumes:
      - name: cache
        persistentVolumeClaim:
          claimName: immich-ml-cache
---
apiVersion: v1
kind: Service
metadata:
  name: immich-ml
  namespace: __NAMESPACE__
spec:
  selector:
    app: immich-ml
  ports:
  - port: 3003
    targetPort: 3003
